<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="settings_title"></title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/options.css">
    <link rel="icon" type="image/svg+xml" href="../images/icon.svg">
  </head>
  <body>
    <div id="page-container">
      <header id="header">
        <div id="logo">
          <img src="../images/icon.svg" width="54" height="50" alt="">
          <div class="brand-copy">
            <span class="brand-name" data-i18n="extension_name"></span>
            <span class="brand-section" data-i18n="settings_title"></span>
          </div>
        </div>
      </header>
      <h1 class="visually-hidden" data-i18n="settings_title"></h1>
      <main id="main">
        <section class="grey-bg panel-card">
          <h2 data-i18n="settings_main_caption"></h2>
          <form>
            <div id="managed-options-notice" class="info-icon hidden" data-i18n="settings_managed_notice"></div>
            <div id="type-option" data-managed-key="type">
              <h3><span data-i18n="type_title"></span><span data-i18n="settings_managed_badge" class="managed-badge hidden"></span></h3>
              <label data-i18n="type_title" for="type" class="hidden-label"></label>
              <div class="select-wrapper option-content">
                <select name="type" id="type">
                  <option data-i18n="type_options_homepage" value="homepage"></option>
                  <option data-i18n="type_options_custom_url" value="custom_url"></option>
                  <option data-i18n="type_options_local_file" value="local_file"></option>
                  <option data-i18n="type_options_background_color" value="background_color"></option>
                  <option data-i18n="type_options_feed" value="feed"></option>
                </select>
              </div>
            </div>
            <div id="homepage-option" class="hidden type-option-detail">
              <div data-i18n="homepage_description" class="info-icon option-content"></div>
            </div>
            <div id="local-file-option" class="hidden type-option-detail">
              <div class="info-icon option-content">
                <span data-i18n="local_file_description"></span>
                <button type="button" data-i18n="local_file_delete_text" id="delete-local-file" class="hidden"></button>
              </div>
              <h3 data-i18n="local_file_upload"></h3>
              <input type="file" id="local-file" class="option-content" accept=".html, .htm">
            </div>
            <div id="background-color-option" class="hidden type-option-detail" data-managed-key="background_color">
              <h3><span data-i18n="background_color_title"></span><span data-i18n="settings_managed_badge" class="managed-badge hidden"></span></h3>
              <label data-i18n="background_color_title" for="background-color" class="hidden-label"></label>
              <div id="background-color-wrapper" class="option-content">
                <span id="background-color-value" aria-hidden="true"></span>
                <!-- eslint-disable-next-line html/use-baseline -->
                <input type="color" name="background_color" id="background-color">
              </div>
            </div>
            <div id="feed-permission-container" class="hidden type-option-detail">
              <h3 data-i18n="settings_permission_action"></h3>
              <label data-i18n="settings_permission_action" for="feed-permission" class="hidden-label"></label>
              <div data-i18n="settings_feed_permission_description" class="info-icon option-content"></div>
              <button data-i18n="settings_permission_action" type="submit" name="feed_permission" id="feed-permission" class="button"></button>
            </div>
            <div id="feed-permission-revoke-container" class="hidden type-option-detail">
              <h3 data-i18n="settings_permission_revoke_action"></h3>
              <div class="info-icon option-content">
                <span data-i18n="settings_feed_permission_revoke_description"></span>
                <a data-i18n="settings_permission_revoke_action" href="#" id="feed-permission-revoke"></a>
              </div>
            </div>
            <div id="context-rules-option" class="hidden">
              <h3><span data-i18n="context_rules_title"></span><span data-i18n="settings_managed_badge" id="context-rules-managed-badge" class="managed-badge hidden"></span></h3>
              <div class="info-icon option-content" data-i18n="url_description"></div>
              <div id="context-rule-editor" class="option-content">
                <label data-i18n="context_rules_scope_label" for="context-rule-scope" class="context-rule-scope-label"></label>
                <div class="select-wrapper context-rule-scope-field">
                  <select id="context-rule-scope"></select>
                </div>
                <label data-i18n="context_rules_container_label" for="context-rule-container" id="context-rule-container-label"></label>
                <div id="context-rule-container-field" class="select-wrapper">
                  <select id="context-rule-container"></select>
                </div>
                <label data-i18n="context_rules_group_label" for="context-rule-group" id="context-rule-group-label" class="hidden"></label>
                <input type="text" id="context-rule-group" class="hidden" data-i18n-placeholder="context_rules_group_placeholder">
                <label data-i18n="context_rules_url_label" for="context-rule-url" class="context-rule-url-label"></label>
                <div id="context-rule-url-wrapper" class="url-wrapper context-rule-url-field">
                  <input type="text" id="context-rule-url" data-i18n-placeholder="settings_url_field_placeholder">
                  <span data-i18n="url_validation_default" class="error-message hidden default"></span>
                  <span data-i18n="url_validation_file" class="error-message hidden file"></span>
                </div>
                <button type="button" id="context-rule-save" class="button" data-i18n="context_rules_save"></button>
              </div>
              <h4 class="context-rules-list-title">
                <span data-i18n="context_rules_list_title"></span>
                <span data-i18n="settings_managed_badge" id="context-rules-list-managed-badge" class="managed-badge hidden"></span>
              </h4>
              <div id="context-rules" class="option-content"></div>
            </div>
            <div id="tab-position-option">
              <h3 data-i18n="tab_position_title"></h3>
              <label data-i18n="type_title" for="type" class="hidden-label"></label>
              <div class="select-wrapper option-content">
                <select name="type" id="tab-position">
                  <option data-i18n="tab_position_option_relatedAfterCurrent" value="relatedAfterCurrent"></option>
                  <option data-i18n="tab_position_option_afterCurrent" value="afterCurrent"></option>
                  <option data-i18n="tab_position_option_atEnd" value="atEnd"></option>
                </select>
              </div>
            </div>
            <div id="focus-option" class="hidden" data-managed-key="focus_website">
              <h3><span data-i18n="focus_website_title"></span><span data-i18n="settings_managed_badge" class="managed-badge hidden"></span></h3>
              <div class="option-content">
                <input type="checkbox" name="focus_website" id="focus-website">
                <label data-i18n="focus_website_description" for="focus-website" class="has-own-label"></label>
              </div>
            </div>
            <div id="clear-option" class="hidden">
              <h3 data-i18n="clear_addressbar_title"></h3>
              <div class="info-icon option-content">
                <span data-i18n="clear_addressbar_description"></span>
                <a data-i18n="learn_more" href="https://bugzilla.mozilla.org/show_bug.cgi?id=1426058" target="_blank" rel="noopener"></a>
              </div>
            </div>
          </form>
        </section>
        <aside class="sidebar-stack">
          <div class="grey-bg panel-card support-links">
            <h2 data-i18n="settings_support_caption"></h2>
            <p>
              <span data-i18n="review_text"></span>
              <a href="https://addons.mozilla.org/firefox/addon/new-tab-override/" target="_blank" rel="noopener">
                addons.mozilla.org</a>
            </p>
            <p>
              <span data-i18n="github_notice"></span>
              <a data-i18n="github_link" href="https://github.com/cadeyrn/newtaboverride/issues" target="_blank" rel="noopener"></a>
            </p>
          </div>
          <div class="promo-box">
            <p data-i18n="settings_donation_text"></p>
            <a data-i18n="settings_donate" href="https://www.paypal.me/agenedia/3" class="button" target="_blank" rel="noopener"></a>
          </div>
        </aside>
      </main>
      <footer id="footer">
        <a href="https://www.soeren-hentzschel.at/firefox-webextensions/new-tab-override/?utm_campaign=webext&utm_term=newtaboverride" target="_blank" rel="noopener">
          <span data-i18n="extension_name"></span>&nbsp;© 2026, soeren-hentzschel.at
        </a>
      </footer>
    </div>
    <dialog id="delete-context-rule-dialog" aria-labelledby="delete-context-rule-dialog-header">
      <header>
        <div id="delete-context-rule-dialog-header" data-i18n="context_rules_delete_dialog_title"></div>
      </header>
      <div class="content text-only">
        <p id="delete-context-rule-dialog-text"></p>
      </div>
      <aside>
        <button type="button" id="delete-context-rule-cancel" class="button secondary-action" data-i18n="common_dialog_btn_cancel" autofocus></button>
        <button type="button" id="delete-context-rule-confirm" class="button destructive-action" data-i18n="context_rules_delete"></button>
      </aside>
    </dialog>
    <dialog id="delete-local-file-dialog" aria-labelledby="delete-local-file-dialog-header">
      <header>
        <div id="delete-local-file-dialog-header" data-i18n="local_file_delete_text"></div>
      </header>
      <div class="content text-only">
        <p data-i18n="local_file_delete_confirmation"></p>
      </div>
      <aside>
        <button type="button" id="delete-local-file-cancel" class="button secondary-action" data-i18n="common_dialog_btn_cancel" autofocus></button>
        <button type="button" id="delete-local-file-confirm" class="button destructive-action" data-i18n="local_file_delete_text"></button>
      </aside>
    </dialog>
    <script src="../js/lib/i18n.js"></script>
    <script src="../js/lib/permissions.js"></script>
    <script src="../js/core/defaults.js"></script>
    <script src="../js/core/utils.js"></script>
    <script src="../js/core/settings.js"></script>
    <script src="../js/core/options_page.js"></script>
  </body>
</html>
